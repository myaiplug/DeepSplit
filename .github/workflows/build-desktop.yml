name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        run: |
          cd backend
          pyinstaller backend.spec

      - name: Build website
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Generate desktop icons
        run: |
          choco install imagemagick -y
          cd desktop-app/build
          magick convert icon.svg -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: Install desktop app dependencies
        run: |
          cd desktop-app
          npm ci

      - name: Build Windows installer
        run: |
          cd desktop-app
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSplit-Windows
          path: desktop-app/dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        run: |
          cd backend
          pyinstaller backend.spec

      - name: Build website
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Generate desktop icons
        run: |
          brew install imagemagick
          cd desktop-app/build
          # Create iconset directory
          mkdir -p icon.iconset
          # Generate multiple resolutions
          magick convert icon.svg -resize 16x16 icon.iconset/icon_16x16.png
          magick convert icon.svg -resize 32x32 icon.iconset/icon_16x16@2x.png
          magick convert icon.svg -resize 32x32 icon.iconset/icon_32x32.png
          magick convert icon.svg -resize 64x64 icon.iconset/icon_32x32@2x.png
          magick convert icon.svg -resize 128x128 icon.iconset/icon_128x128.png
          magick convert icon.svg -resize 256x256 icon.iconset/icon_128x128@2x.png
          magick convert icon.svg -resize 256x256 icon.iconset/icon_256x256.png
          magick convert icon.svg -resize 512x512 icon.iconset/icon_256x256@2x.png
          magick convert icon.svg -resize 512x512 icon.iconset/icon_512x512.png
          magick convert icon.svg -resize 1024x1024 icon.iconset/icon_512x512@2x.png
          # Convert to icns
          iconutil -c icns icon.iconset
          rm -rf icon.iconset

      - name: Install desktop app dependencies
        run: |
          cd desktop-app
          npm ci

      - name: Build macOS installer
        run: |
          cd desktop-app
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeepSplit-macOS
          path: |
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            DeepSplit-Windows/*.exe
            DeepSplit-macOS/*.dmg
            DeepSplit-macOS/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
